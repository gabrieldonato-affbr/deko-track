<style>
  @font-face {
    font-family: 'Inter';
    font-style: normal;
    font-weight: 400;
    font-display: swap;
    src: url('https://dekoroleta.apostaonline.bet.br/wp-content/uploads/2025/07/Inter_28pt-Regular.woff2') format('woff2');
  }
  @font-face {
    font-family: 'Inter';
    font-style: normal;
    font-weight: 600;
    font-display: swap;
    src: url('https://dekoroleta.apostaonline.bet.br/wp-content/uploads/2025/07/Inter_28pt-Bold.woff2') format('woff2');
  }
  @font-face {
    font-family: 'Inter';
    font-style: normal;
    font-weight: 800;
    font-display: swap;
    src: url('https://dekoroleta.apostaonline.bet.br/wp-content/uploads/2025/07/Inter_28pt-Bold.woff2') format('woff2');
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background-color: #000;
    font-family: 'Inter', Arial, sans-serif;
    color: #fff;
    min-height: 100vh;
    text-transform: uppercase;
  }
  img { max-width: 100%; height: auto; display: block; }

  /* HERO */
  .hero {
    position: relative;
    min-height: 100vh;
    overflow: hidden;
    background-color: #000;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background-image: url('imagem-principal.png');
    background-repeat: no-repeat;
    background-size: cover;
    background-position: 0% center;
    z-index: 0;
  }
  /* Gradient overlay so the left side darkens for text legibility */
  .hero-bg::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg,
      rgba(0,0,0,0.95) 0%,
      rgba(0,0,0,0.7) 30%,
      rgba(0,0,0,0.25) 55%,
      rgba(0,0,0,0) 75%);
  }

  .hero-inner {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 48px 64px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .logo {
    width: 170px;
    margin-bottom: 40px;
  }
  .logo img { width: 100%; height: auto; }

  .headline {
    max-width: 640px;
    font-family: 'Inter', sans-serif;
    font-weight: 800;
    font-size: 54px;
    line-height: 1.05;
    letter-spacing: -0.5px;
    color: #ffffff;
    margin: 0 0 36px 0;
    text-shadow: 0 2px 16px rgba(0,0,0,0.6);
  }
  .headline .price { color: #ff1f1f; white-space: nowrap; }

  /* CTA */
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 17px;
    background-color: #FF0000;
    color: #FFFFFF;
    fill: #FFFFFF;
    font-family: 'Inter', sans-serif;
    font-size: 30px;
    font-weight: 600;
    text-decoration: none;
    padding: 20px 38px;
    border-radius: 12px;
    line-height: 1;
    box-shadow: 0 8px 28px rgba(255,0,0,0.35);
    animation: pulse-scale 1.5s infinite;
    transform-origin: center;
    align-self: flex-start;
  }
  .cta svg { width: 1em; height: 1em; }
  @keyframes pulse-scale {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.05); }
    100% { transform: scale(1); }
  }

  /* FOOTER */
  footer {
    padding: 2em 16px 1em;
    text-align: center;
    background: #000;
    position: relative;
    z-index: 2;
  }
  footer h2 {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 400;
    color: #535353;
    margin: 0;
    text-transform: uppercase;
  }

  /* RESPONSIVE */
  @media (max-width: 1024px) {
    .hero-inner { padding: 40px 32px; }
    .headline { font-size: 44px; max-width: 540px; }
  }

  @media (max-width: 767px) {
    .hero-bg {
      background-image: url('imagem-mobile.png');
      background-position: top center;
      background-size: cover;
    }
    /* Gradient: keep top (subject) visible, darken bottom (text area) */
    .hero-bg::after {
      background: linear-gradient(180deg,
        rgba(0,0,0,0) 0%,
        rgba(0,0,0,0) 40%,
        rgba(0,0,0,0.55) 55%,
        rgba(0,0,0,0.9) 70%,
        rgba(0,0,0,0.98) 100%);
    }
    .hero-inner {
      padding: 24px 20px 40px;
      justify-content: flex-end;
      align-items: center;
      text-align: center;
      min-height: 100vh;
    }
    .logo {
      width: 110px;
      margin-bottom: 16px;
      align-self: center;
    }
    .headline {
      font-size: 30px;
      line-height: 1.1;
      max-width: 100%;
      margin-bottom: 22px;
      text-align: center;
    }
    .cta {
      font-size: 22px;
      padding: 16px 28px;
      align-self: center;
    }
  }

  @media (max-width: 380px) {
    .headline { font-size: 28px; }
    .cta { font-size: 20px; }
  }
</style>
</head>

</body>
</html>
