<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>DEKO ROLETA – TRACK – Deko Roleta</title>
<link rel="icon" href="https://dekoroleta.com/wp-content/uploads/2025/05/cropped-5-100-32x32.jpg" sizes="32x32" />

<style>
  /* Fonts */
  @font-face {
    font-family: 'Inter';
    font-style: normal;
    font-weight: 400;
    font-display: swap;
    src: url('https://dekoroleta.apostaonline.bet.br/wp-content/uploads/2025/07/Inter_28pt-Regular.woff2') format('woff2');
  }
  @font-face {
    font-family: 'Inter';
    font-style: normal;
    font-weight: 600;
    font-display: swap;
    src: url('https://dekoroleta.apostaonline.bet.br/wp-content/uploads/2025/07/Inter_28pt-Bold.woff2') format('woff2');
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background-color: #181818;
    font-family: 'Inter', Arial, sans-serif;
    color: #fff;
    min-height: 100vh;
  }
  img { max-width: 100%; height: auto; display: block; }

  /* Hero section */
  .hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 770px;
    padding: 40px 16px;
    background-image: url('https://dekoroleta.com/wp-content/uploads/2025/05/Prancheta-1.jpg');
    background-position: center center;
    background-repeat: no-repeat;
    background-size: cover;
    gap: 24px;
  }

  .hero .logo {
    width: 12%;
    max-width: 170px;
    min-width: 110px;
    align-self: flex-start;
    margin-left: 5%;
  }

  .hero .main-image {
    width: 50%;
    max-width: 640px;
  }
  .hero .main-image img { width: 80%; margin: 0 auto; }

  .cta-wrapper { text-align: center; }
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 17px;
    background-color: #FF0000;
    color: #FFFFFF;
    fill: #FFFFFF;
    font-family: 'Inter', sans-serif;
    font-size: 30px;
    font-weight: 600;
    text-decoration: none;
    padding: 20px 30px;
    border-radius: 10px;
    line-height: 1;
    animation: pulse-scale 1.5s infinite;
    transform-origin: center;
  }
  .cta svg { width: 1em; height: 1em; }

  @keyframes pulse-scale {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.1); }
    100% { transform: scale(1); }
  }

  /* Footer */
  footer {
    padding: 2em 0 1em;
    text-align: center;
  }
  footer h2 {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 400;
    color: #535353;
    margin: 0;
  }

  /* Responsive */
  @media (max-width: 1024px) {
    .hero {
      min-height: 628px;
      padding-top: 10em;
      background-image: url('https://dekoroleta.com/wp-content/uploads/2025/05/SECAO-1-MOB.jpg');
      background-position: top center;
    }
    .hero .logo { width: 162px; max-width: 162px; margin-left: 5%; }
    .hero .main-image { width: 100%; max-width: 90%; }
  }

  @media (max-width: 767px) {
    .hero { padding-left: 5%; padding-right: 5%; }
    .hero .logo { width: 126px; max-width: 126px; }
    .hero .main-image { width: 100%; max-width: 100%; }
    .hero .main-image img { width: 100%; }
    .cta { font-size: 23px; }
  }
</style>
</head>
<body>
  <section class="hero">
    <!-- Logo Deko (mantido do original) -->
    <div class="logo">
      <img src="https://dekoroleta.com/wp-content/uploads/2025/05/PRINCIPAL-1024x572.png"
           alt="Deko Roleta"
           fetchpriority="high" decoding="async" />
    </div>

    <!-- Imagem principal (substituída pela anexada) -->
    <div class="main-image">
      <img src="imagem-principal.png" alt="Imagem principal" decoding="async" />
    </div>

    <!-- Botão CTA Telegram -->
    <div class="cta-wrapper">
      <a class="cta" href="https://t.me/+DTLDm5RKSGgyYzVh">
        <svg aria-hidden="true" viewBox="0 0 496 512" xmlns="http://www.w3.org/2000/svg">
          <path d="M248 8C111 8 0 119 0 256s111 248 248 248 248-111 248-248S385 8 248 8zm121.8 169.9l-40.7 191.8c-3 13.6-11.1 16.9-22.4 10.5l-62-45.7-29.9 28.8c-3.3 3.3-6.1 6.1-12.5 6.1l4.4-63.1 114.9-103.8c5-4.4-1.1-6.9-7.7-2.5l-142 89.4-61.2-19.1c-13.3-4.2-13.6-13.3 2.8-19.7l239.1-92.2c11.1-4 20.8 2.7 17.2 19.5z"></path>
        </svg>
        <span>ACESSAR GRUPO</span>
      </a>
    </div>
  </section>

  <footer>
    <h2>Copyright 2025 – Deko Roleta ® Todos os direitos reservados.</h2>
  </footer>
</body>
</html>
